<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="myscripts.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <h2> How much can I borrow? </h2>
        <form id="borrowing-amount-form" onsubmit="return false;">
            <label for="house-price">house price:</label>
            <input type="text" id="house-price" name="house-price"><br>

            <label for="deposit-amount">deposit amount:</label>
            <input type="text" id="deposit-amount" name="deposit-amount"><br>

            <label for="annual-income">annual income:</label>
            <input type="text" id="annual-income" name="annual-income"><br>

            <button id="calculate-borrowing-btn">Calculate borrowing</button>
        </form>

    <h2> What is the monthly cost? </h2>
        <form id="monthly-cost-form" onsubmit="return false;">
            <label for="interest-rate">interest rate:</label>
            <input type="text" id="interest-rate" name="interest-rate"><br>

            <label for="mortgage-term">mortgage term:</label>
            <input type="text" id="mortgage-term" name="mortgage-term"><br>

            <button id="calculate-monthly-cost-btn">Calculate monthly cost</button>
        </form>
</body>
</html>
